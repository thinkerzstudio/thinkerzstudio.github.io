<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THINKERZ STUDIO</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;500;600;700;900&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --black: #0a0a0a;
            --white: #f5f5f0;
            --gray-1: #141414;
            --gray-2: #222;
            --gray-3: #555;
            --gray-4: #888;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            background: var(--black);
            color: var(--white);
            font-family: 'Noto Sans KR', sans-serif;
            font-weight: 300;
            overflow-x: hidden;
        }

        /* NAV */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: 20px 48px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to bottom, rgba(10,10,10,0.95) 0%, rgba(10,10,10,0.8) 60%, transparent 100%);
            backdrop-filter: blur(5px);
        }

        .nav-logo {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--white);
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 32px;
            list-style: none;
        }

        .nav-links a {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--gray-3);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .nav-links a:hover,
        .nav-links a.active { 
            color: var(--white); 
        }

        @media (max-width: 600px) {
            nav { padding: 16px 24px; }
            .nav-links { gap: 20px; }
            .nav-links a { font-size: 10px; }
        }

        /* HERO — STUDIO */
        .studio-hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 56px 48px;
            border-bottom: 1px solid var(--gray-2);
            position: relative;
        }

        .studio-hero-tag {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.4em;
            color: var(--gray-3);
            text-transform: uppercase;
            margin-bottom: 24px;
            opacity: 0;
            animation: fadeUp 0.8s ease forwards 0.2s;
        }

        .studio-hero-title {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: clamp(48px, 10vw, 120px);
            font-weight: 900;
            line-height: 0.9;
            letter-spacing: -0.02em;
            text-transform: uppercase;
            color: var(--white);
            margin-bottom: 32px;
            opacity: 0;
            animation: fadeUp 0.8s ease forwards 0.4s;
        }

        .studio-hero-tagline {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: clamp(18px, 3vw, 32px);
            font-weight: 300;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--gray-4);
            margin-bottom: 40px;
            opacity: 0;
            animation: fadeUp 0.8s ease forwards 0.6s;
        }

        .studio-hero-desc {
            font-size: clamp(13px, 1.6vw, 16px);
            font-weight: 300;
            line-height: 1.9;
            color: var(--gray-3);
            max-width: 560px;
            opacity: 0;
            animation: fadeUp 0.8s ease forwards 0.8s;
        }

        /* DIVIDER */
        .vluw-divider {
            padding: 80px 48px 48px 48px;
            border-bottom: 1px solid var(--gray-2);
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        .vluw-divider.visible { opacity: 1; transform: none; }

        .vluw-divider-label {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.4em;
            color: var(--gray-3);
            text-transform: uppercase;
            margin-bottom: 16px;
        }

        .vluw-divider-title {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: clamp(36px, 8vw, 80px);
            font-weight: 900;
            letter-spacing: -0.02em;
            text-transform: uppercase;
            color: var(--white);
            line-height: 0.9;
        }

        /* SECTIONS */
        section {
            padding: 100px 48px 60px 48px;
            border-bottom: 1px solid var(--gray-1);
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        section.visible { opacity: 1; transform: none; }

        .label {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.4em;
            color: var(--gray-3);
            text-transform: uppercase;
            margin-bottom: 40px;
        }

        /* HERO — VLUW */
        .vluw-hero {
            min-height: 70vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 56px 48px;
            border-bottom: 1px solid var(--gray-2);
            position: relative;
            overflow: hidden;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        .vluw-hero.visible { opacity: 1; transform: none; }

        .vluw-hero-img {
            position: absolute;
            inset: 0;
            /* 히어로 그룹 프로필 주소 교체 */
            background: url('images/VLUW_Group_Profile.jpg') center/cover no-repeat;
        }

        .vluw-hero-img::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(10,10,10,1) 0%, rgba(10,10,10,0.55) 40%, rgba(10,10,10,0.05) 100%);
        }

        .vluw-hero-content {
            position: relative;
            z-index: 1;
        }

        .vluw-hero-hook {
            font-size: clamp(13px, 1.6vw, 16px);
            font-weight: 300;
            color: var(--gray-4);
            line-height: 1.8;
            margin-bottom: 16px;
        }

        .vluw-hero-title {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: clamp(56px, 12vw, 120px);
            font-weight: 900;
            line-height: 0.88;
            letter-spacing: -0.02em;
            text-transform: uppercase;
            color: var(--white);
        }

        /* WHAT */
        .what-intro {
            font-size: clamp(14px, 1.8vw, 18px);
            font-weight: 300;
            line-height: 1.9;
            color: var(--gray-4);
            max-width: 640px;
            margin-bottom: 56px;
        }

        /* MEMBERS */
        .members {
            display: flex;
            flex-direction: column;
            border-top: 1px solid var(--gray-2);
        }

        .member {
            display: grid;
            grid-template-columns: 220px 1fr;
            gap: 48px;
            padding: 48px 0;
            border-bottom: 1px solid var(--gray-2);
            transition: background 0.3s ease;
        }

        @media (max-width: 640px) {
            .member { grid-template-columns: 1fr; gap: 20px; }
        }

        .member:hover { background: var(--gray-1); padding-left: 10px; }

        .member-photo {
            width: 100%;
            /* 원래 디자인의 3:4 세로 비율 그대로 복구 */
            aspect-ratio: 3/4;
            object-fit: cover;
            filter: grayscale(20%);
            transition: filter 0.3s ease;
        }
        .member:hover .member-photo { filter: grayscale(0%); }

        .member-name-en {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            color: var(--white);
            line-height: 1;
            margin-bottom: 4px;
        }

        .member-name-kr {
            font-size: 12px;
            font-weight: 300;
            color: var(--gray-3);
            margin-bottom: 10px;
        }

        .member-role {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.2em;
            color: var(--gray-3);
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        .member-tags {
            font-size: 11px;
            font-weight: 300;
            color: var(--gray-3);
            line-height: 1.8;
            margin-bottom: 16px;
        }

        .member-desc {
            font-size: 14px;
            font-weight: 300;
            color: var(--gray-4);
            line-height: 1.9;
        }

        /* MUSIC */
        .music-block { margin-bottom: 64px; }

        .music-block-title {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.35em;
            color: var(--gray-3);
            text-transform: uppercase;
            margin-bottom: 32px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--gray-2);
        }

        .track {
            display: grid;
            grid-template-columns: 120px 1fr;
            gap: 32px;
            padding: 28px 0;
            border-bottom: 1px solid var(--gray-1);
            transition: background 0.3s ease;
        }

        .track:hover { background: rgba(255,255,255,0.01); }

        @media (max-width: 560px) {
            .track { grid-template-columns: 1fr; gap: 16px; }
        }

        .track-cover {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
        }

        .track-title {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 0.05em;
            color: var(--white);
            margin-bottom: 8px;
        }

        .track-desc {
            font-size: 13px;
            font-weight: 300;
            color: var(--gray-4);
            line-height: 1.8;
            margin-bottom: 12px;
        }

        .track-link {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.2em;
            color: var(--gray-3);
            text-decoration: none;
            text-transform: uppercase;
            border-bottom: 1px solid var(--gray-2);
            padding-bottom: 2px;
            transition: color 0.15s, border-color 0.15s;
        }

        .track-link:hover { color: var(--white); border-color: var(--white); }

        .album-intro {
            font-size: 14px;
            font-weight: 300;
            color: var(--gray-4);
            line-height: 1.9;
            max-width: 640px;
            margin-bottom: 40px;
        }

        .tracklist-label {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.3em;
            color: var(--gray-3);
            text-transform: uppercase;
            margin-bottom: 24px;
        }

        .music-links {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 40px;
            padding-top: 32px;
            border-top: 1px solid var(--gray-2);
        }

        .btn {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            text-decoration: none;
            padding: 10px 20px;
            transition: all 0.15s;
        }

        .btn-primary { background: var(--white); color: var(--black); }
        .btn-primary:hover { background: var(--gray-4); color: var(--white); }
        .btn-secondary { border: 1px solid var(--gray-2); color: var(--gray-3); }
        .btn-secondary:hover { border-color: var(--white); color: var(--white); }

        /* STORY */
        .story-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1px;
            background: var(--gray-2);
            border: 1px solid var(--gray-2);
            max-width: 720px;
        }

        @media (max-width: 560px) { .story-grid { grid-template-columns: 1fr; } }

        .story-item {
            background: var(--black);
            padding: 32px 28px;
            transition: background 0.2s;
        }

        .story-item:hover { background: var(--gray-1); }

        .story-cover {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
            margin-bottom: 20px;
        }

        .story-title {
            font-size: 14px;
            font-weight: 400;
            color: var(--white);
            line-height: 1.6;
            margin-bottom: 10px;
        }

        .story-desc {
            font-size: 12px;
            font-weight: 300;
            color: var(--gray-3);
            line-height: 1.7;
            margin-bottom: 16px;
        }

        .story-link {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.2em;
            color: var(--white);
            text-decoration: none;
            text-transform: uppercase;
            border-bottom: 1px solid var(--gray-2);
            padding-bottom: 2px;
            transition: border-color 0.15s;
        }

        .story-link:hover { border-color: var(--white); }

        /* LINKS */
        .links-grid {
            display: flex;
            flex-direction: column;
            border: 1px solid var(--gray-2);
            max-width: 400px;
        }

        .link-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            border-bottom: 1px solid var(--gray-2);
            text-decoration: none;
            transition: background 0.2s;
        }

        .link-item:last-child { border-bottom: none; }
        .link-item:hover { background: var(--gray-1); }

        .link-name {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.2em;
            color: var(--white);
            text-transform: uppercase;
        }

        .link-arrow { font-size: 12px; color: var(--gray-3); }

        /* CONTACT */
        .contact-sub {
            font-size: 13px;
            font-weight: 300;
            color: var(--gray-3);
            margin-bottom: 28px;
            line-height: 1.8;
        }

        .contact-email {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: clamp(22px, 4vw, 40px);
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: var(--white);
            text-decoration: none;
            border-bottom: 1px solid var(--gray-2);
            padding-bottom: 4px;
            transition: border-color 0.2s;
            display: inline-block;
        }

        .contact-email:hover { border-color: var(--white); }

        /* FOOTER */
        footer {
            padding: 40px 48px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            border-top: 1px solid var(--gray-1);
